# Aïobi OS — aiobi-update policy configuration.
#
# Parsed by /usr/local/lib/aiobi-update/policy.py with the stdlib
# configparser. Missing file -> built-in defaults; malformed file ->
# aiobi-update exits 10 (config error).

[cadence]
# Documentary only — the actual cadence is enforced by the systemd
# timers (aiobi-update.timer, aiobi-update-security.timer). Changing
# these values here does not change the timers; edit the .timer units.
check_cron    = weekly-sunday-0600
security_cron = daily-0300

# Auto-apply security-only updates overnight via aiobi-update-security.timer
# -> aiobi-update-apply.service (aiobi-update --apply --security-only -y).
auto_apply_security = true

# Auto-apply ALL upgradable packages (not just security) with no user
# confirmation. Left false: full dist-upgrades stay under user control
# via the weekly notification -> GTK confirm flow.
auto_apply_all = false

[blacklist]
# Packages excluded from every aiobi-update transaction (--check counts
# them as NOT upgradable; --apply never names them in an apt-get
# invocation). Kernels are deliberately NOT blacklisted — kernel
# packages update normally through APT, and aiobi-update surfaces the
# post-update state via /var/run/reboot-required ("reboot required"
# notification), not via this list.
#
# snapd + companions: purged by aos-debloat.service at first boot;
# blacklisted here so a later `apt install` cannot pull them back in
# as a transitive dependency of an unrelated package upgrade.
#
# update-manager / update-notifier / software-properties-gtk: Ubuntu's
# native update GUI stack, purged by scripts/23-install-aiobi-update.sh
# because aiobi-update replaces it and the GUI is buggy on Aïobi
# (depends on the same apport/whoopsie stack aos-debloat.service
# removes). software-properties-common is intentionally NOT listed —
# it provides add-apt-repository, relied on by scripts 01 and 12.
packages = snapd, snap-confine, snapd-desktop-integration, apport, whoopsie, ubuntu-report, popularity-contest, apport-symptoms, update-manager, update-manager-core, update-notifier, update-notifier-common, software-properties-gtk

[notify]
# Suppress the desktop notification when --check finds 0 updates.
silent_check  = true
# Show a GTK progress popup during --apply (skipped entirely for
# --apply --security-only, which never raises a GUI).
show_progress = true
# Show a GTK summary popup after --apply completes.
show_summary  = true
